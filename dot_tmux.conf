# vim: set ft=tmux:

##### Core ############################################################

# Faster Vim mode switching and larger scrollback.
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5

# Terminal/features.
set -g default-terminal "tmux-256color"
set -s terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:extkeys'
set -as terminal-features 'screen*:title'
set -as terminal-features 'rxvt*:ignorefkeys'

# Extended keys for modified keys like Shift+Enter / Ctrl+Enter.
set -s extended-keys always
set -s extended-keys-format csi-u

# Shell. Prefer fish when available without hard-coding a single platform path.
run-shell 'tmux set-option -g default-shell "$(command -v fish || echo /bin/sh)"'

# General behavior.
set -g mouse on
set -g focus-events on
set -g status-keys emacs
setw -g aggressive-resize on
set -g status-position top

# Number windows/panes from 1 and renumber after close.
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### Prefix ##########################################################

# Use Ctrl+; as prefix instead of Ctrl+b.
unbind C-b
unbind C-\;
set -g prefix C-\;
bind \; send-prefix

##### Windows and panes ##############################################

# Create windows/panes in the current pane's path.
unbind %
unbind '"'
bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind Enter split-window -v -c "#{pane_current_path}"

# Pane management.
bind x kill-pane
unbind z
unbind m
bind m resize-pane -Z
bind -r DC select-layout tiled

# Pane resizing.
bind -r - resize-pane -D 2
bind -r = resize-pane -U 2
bind -r [ resize-pane -L 2
bind -r ] resize-pane -R 2

# Reload config.
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded 🚀"

##### Copy mode ######################################################

setw -g mode-keys vi
bind v copy-mode

bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# Pane navigation while in copy mode, matching vim-tmux-navigator.
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi C-\\ select-pane -l
bind -T copy-mode-vi C-Space select-pane -t:.+

##### Plugins ########################################################

# TPM.
set -g @plugin 'tmux-plugins/tpm'

# Seamless navigation between Vim/Neovim and tmux panes.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme. Keep before continuum so status-right is not overwritten.
set -g @plugin 'dracula/tmux'
set -g @dracula-show-flags true
set -g @dracula-plugins "ssh-session battery"
set -g @dracula-show-left-icon "#S"
set -g @dracula-show-powerline true

# Session persistence.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes '"pi->pi -c"'
set -g @resurrect-capture-pane-contents 'on'

# Automatic session save/restore.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

##### TPM bootstrap ##################################################

# Keep mutable plugin checkouts outside the stowed config tree.
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

if "test ! -d ~/.local/share/tmux/plugins/tpm" \
  "run 'mkdir -p ~/.local/share/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM. Must stay last.
run '~/.local/share/tmux/plugins/tpm/tpm'
