# Vite Plus node shims can occasionally take longer than Starship's default
# 500ms timeout to resolve. Give language-version commands a bit more room and
# avoid probing Node in repos that merely contain JS/TS files.
command_timeout = 2000

# Put custom.scm right after directory
format = "$directory${custom.scm}$all"

[buf]
disabled = true

[directory]
truncate_to_repo = false

[git_branch]
# disabled = true
symbol = " "
truncation_length = 18

[git_status]
# disabled = true

[git_commit]
# disabled = true

[git_state]
# disabled = true

# [custom.scm]
# when = "jj-starship detect"
# shell = ["jj-starship", "--strip-bookmark-prefix", "dmmulroy/", "--truncate-name", "20", "--bookmarks-display-limit", "1"]
# format = "$output "

[lua]
symbol = " "

[nodejs]
# Only show Node for actual Node projects. This avoids unnecessary `node
# --version` calls in repos that just happen to contain JS/TS files.
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc", ".tool-versions"]
detect_folders = ["node_modules"]

[package]
disabled = true

[battery]

[direnv]
disabled = false
